<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>기초웹프로그래밍 최종 과제</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fafafa;
            color: #262626;
        }
        header {
            background-color: #ffffff;
            border-bottom: 1px solid #dbdbdb;
            padding: 15px 0;
            text-align: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }
        header h1 { margin: 0; font-size: 20px; color: #1a365d; }
        main {
            max-width: 600px;
            margin: 80px auto 20px auto;
            padding: 10px;
        }
        .upload-section {
            background: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .upload-section h3 { margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        .form-group input[type="text"], .form-group textarea {
            width: 96%;
            padding: 8px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
        }
        .form-group input[type="file"] {
            display: block;
            margin-top: 5px;
        }
        .range-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #8e8e8e;
            margin-bottom: 5px;
        }
        .post-card {
            background: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            margin-bottom: 24px;
        }
        /* [수정] 상단 헤더 공간에 삭제 버튼 배치를 위해 flex와 relative 적용 */
        .post-header { 
            padding: 14px; 
            font-weight: bold; 
            font-size: 14px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid #efefef;
        }
        /* 삭제 버튼 전용 스타일 */
        .delete-btn {
            background: none;
            border: none;
            color: #ed8936;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .delete-btn:hover {
            background: #fff5f5;
            color: #e53e3e;
        }
        .post-img { width: 100%; height: auto; display: block; }
        .post-body { padding: 14px; }
        .post-actions { margin-bottom: 10px; }
        .like-btn {
            background: none; border: none; font-size: 20px; cursor: pointer;
            transition: transform 0.2s;
        }
        .like-btn:hover { transform: scale(1.3); }
        .post-content { font-size: 14px; line-height: 1.5; }
        .post-content span { font-weight: bold; margin-right: 8px; }
        .mood-tag {
            display: inline-block; background: #edf2f7; padding: 2px 6px;
            border-radius: 4px; font-size: 12px; color: #4a5568; margin-top: 5px;
        }
        .comment-box { border-top: 1px solid #efefef; padding: 10px 14px; display: flex; }
        .comment-input { flex-grow: 1; border: none; resize: none; height: 18px; }
        .comment-input:focus { outline: none; }
        .comment-submit { background: none; border: none; color: #0095f6; font-weight: bold; cursor: pointer; }
        .comment-list { padding: 0 14px 10px 14px; font-size: 13px; list-style: none; }
        .comment-item { margin-bottom: 4px; }
        .comment-item b { margin-right: 6px; }
    </style>
</head>
<body>

    <header>
        <h1>SNS</h1>
    </header>

    <main>
        <section class="upload-section">
            <h3>새 게시글 작성</h3>
            <form id="postForm">
                <div class="form-group">
                    <input type="text" id="authorInput" placeholder="작성자 이름" required>
                </div>
                <div class="form-group">
                    <label style="font-size: 14px; font-weight: bold; color: #4a5568;">피드 사진 선택:</label>
                    <input type="file" id="fileInput" accept="image/*" required>
                </div>
                <div class="form-group">
                    <textarea id="contentInput" placeholder="문구 입력..." rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <div class="range-label">
                        <span>오늘의 기분</span>
                        <span id="rangeVal">50</span>
                    </div>
                    <input type="range" id="moodInput" min="0" max="100" value="50" style="width:100%;"
                           oninput="document.getElementById('rangeVal').innerText = this.value">
                </div>
                <button type="submit" style="width:100%; padding:10px; background:#0095f6; color:white; border:none; font-weight:bold; border-radius:4px; cursor:pointer;">공유하기</button>
            </form>
        </section>

        <section id="feedContainer">
            </section>
    </main>

    <script>
        // 로컬 스토리지 데이터 동기화
        let posts = JSON.parse(localStorage.getItem("sns_file_posts")) || [];

        const feedContainer = document.getElementById("feedContainer");

        // 피드 화면 렌더링 함수 (10주차 DOM 구조 조작 기술)
        function renderFeed() {
            feedContainer.innerHTML = ""; 
            
            if (posts.length === 0) {
                feedContainer.innerHTML = "<p style='text-align:center; color:#8e8e8e; padding:40px 0;'>아직 등록된 피드가 없습니다. 첫 사진을 업로드해 보세요!</p>";
                return;
            }

            // 역순 렌더링 (최신 글이 위로)
            for(let i = posts.length - 1; i >= 0; i--) {
                let post = posts[i];
                let card = document.createElement("article");
                card.className = "post-card";
                card.id = `post-card-${i}`; // [추정용] 각 카드 박스에 고유 ID 부여
                
                // [수정] 작성자 이름 옆에 '삭제' 버튼을 동적으로 끼워 넣음 (onclick 연동)
                let htmlStructure = `
                    <div class="post-header">
                        <span>${post.author}</span>
                        <button class="delete-btn" onclick="deletePost(${i})">삭제</button>
                    </div>
                    <img class="post-img" src="${post.img}" alt="피드 이미지">
                    <div class="post-body">
                        <div class="post-actions">
                            <button class="like-btn" onclick="increaseLike(${i})">❤️</button>
                            <span style="font-size:14px; font-weight:bold; margin-left:5px;">좋아요 ${post.likes}개</span>
                        </div>
                        <div class="post-content">
                            <span>${post.author}</span>${post.content}
                        </div>
                        <div>
                            <span class="mood-tag">오늘의 기분: ${post.mood} 점</span>
                        </div>
                    </div>
                    <ul class="comment-list" id="comment-list-${i}"></ul>
                    <div class="comment-box">
                        <input type="text" class="comment-input" id="comment-in-${i}" placeholder="댓글 달기...">
                        <button class="comment-submit" onclick="addComment(${i})">게시</button>
                    </div>
                `;
                
                card.innerHTML = htmlStructure;
                feedContainer.appendChild(card);
                
                let commentListUl = document.getElementById(`comment-list-${i}`);
                post.comments.forEach(function(cmt) {
                    let li = document.createElement("li");
                    li.className = "comment-item";
                    li.innerHTML = `<b>익명</b> ${cmt}`;
                    commentListUl.appendChild(li);
                });
            }
        }

        // [완전 새로 추가] 게시글 삭제 함수 (10주차 DOM removeChild 응용)
        function deletePost(index) {
            if (confirm("게시글을 삭제하시겠습니까?")) {
                
                // 1. 시각적인 삭제 처리 (10주차 DOM 삭제 API 실습)
                let targetCard = document.getElementById(`post-card-${index}`);
                if (targetCard) {
                    feedContainer.removeChild(targetCard); // 부모노드(feedContainer)에서 자식 카드 요소를 영구 탈거
                }

                // 2. 메모리 데이터 배열에서 삭제 (9주차 배열 다루기)
                posts.splice(index, 1); // 해당 순번(index)의 데이터 1개를 배열에서 파내어 분리 제거
                
                // 3. 로컬 스토리지 동기화 (13주차 데이터 반영)
                updateStorage();
            }
        }

        // 폼 Submit 이벤트 처리
        document.getElementById("postForm").addEventListener("submit", function(e) {
            e.preventDefault(); 
            
            let author = document.getElementById("authorInput").value;
            let content = document.getElementById("contentInput").value;
            let mood = document.getElementById("moodInput").value;
            let fileElement = document.getElementById("fileInput").files[0];
            
            if (!fileElement) return;

            let reader = new FileReader();
            
            reader.onload = function(event) {
                let base64Image = event.target.result;

                posts.push({
                    id: Date.now(),
                    author: author,
                    img: base64Image,
                    content: content,
                    mood: mood,
                    likes: 0,
                    comments: []
                });
                
                updateStorage();
                
                document.getElementById("postForm").reset();
                document.getElementById("rangeVal").innerText = 50;
            };

            reader.readAsDataURL(fileElement);
        });

        function increaseLike(index) {
            posts[index].likes += 1;
            updateStorage();
        }

        function addComment(index) {
            let inputField = document.getElementById(`comment-in-${index}`);
            if(inputField.value.trim() === "") return;
            
            posts[index].comments.push(inputField.value);
            updateStorage();
        }

        function updateStorage() {
            try {
                localStorage.setItem("sns_file_posts", JSON.stringify(posts));
                renderFeed(); // 삭제 후 바뀐 데이터 인덱스 번호들을 재정렬하기 위해 화면을 다시 렌더링
            } catch (e) {
                alert("데이터 저장 공간이 부족합니다! 오래된 사진을 삭제하거나 작은 용량의 파일을 이용하세요.");
                console.error(e);
            }
        }

        renderFeed();
    </script>
</body>
</html>
